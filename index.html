<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumina - Read & Ask</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .pdf-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: white;
      position: relative;
    }

    .pdf-header {
      padding: 12px 16px;
      border-bottom: 1px solid #ddd;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fafafa;
    }

    .pdf-header h1 {
      font-size: 13px;
      font-weight: 600;
      color: #333;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .upload-btn {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: white;
      cursor: pointer;
      font-size: 12px;
      color: #666;
    }

    .upload-btn:hover {
      background: #f0f0f0;
    }

    #file-input {
      display: none;
    }

    .pdf-viewer {
      flex: 1;
      overflow: auto;
      background: #f5f5f5;
    }

    .pdf-viewer embed {
      width: 100%;
      height: 100%;
    }

    .pdf-footer {
      padding: 12px 16px;
      border-top: 1px solid #ddd;
      background: #fafafa;
      text-align: center;
      font-size: 12px;
      color: #666;
    }

    /* Ask AI Button */
    .ask-ai-btn {
      position: absolute;
      bottom: 24px;
      right: 24px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
      transition: all 0.2s;
      z-index: 100;
    }

    .ask-ai-btn:hover {
      background: #1d4ed8;
      box-shadow: 0 6px 16px rgba(37, 99, 235, 0.4);
      transform: scale(1.1);
    }

    .ask-ai-btn:active {
      transform: scale(0.95);
    }

    /* AI Panel Overlay */
    .ai-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.3);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 200;
    }

    .ai-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* AI Panel */
    .ai-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 380px;
      height: 100vh;
      background: white;
      box-shadow: -4px 0 16px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      transform: translateX(400px);
      transition: transform 0.3s ease;
      z-index: 201;
    }

    .ai-panel.active {
      transform: translateX(0);
    }

    .ai-header {
      padding: 16px;
      border-bottom: 1px solid #ddd;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .ai-header h2 {
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: #666;
      padding: 4px;
    }

    .close-btn:hover {
      color: #333;
    }

    .api-key-input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
      font-family: monospace;
      margin-top: 8px;
    }

    .ai-content {
      flex: 1;
      overflow: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .question-input {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    textarea {
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
      font-family: inherit;
      min-height: 80px;
      max-height: 150px;
      resize: vertical;
    }

    .ask-btn {
      padding: 10px 12px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
    }

    .ask-btn:hover {
      background: #1d4ed8;
    }

    .ask-btn:disabled {
      background: #999;
      cursor: not-allowed;
    }

    .answer-box {
      background: #f9f9f9;
      padding: 12px;
      border-radius: 4px;
      border-left: 3px solid #2563eb;
      font-size: 12px;
      line-height: 1.5;
      color: #333;
      max-height: 400px;
      overflow: auto;
    }

    .loading {
      color: #666;
      font-style: italic;
      font-size: 12px;
    }

    .error {
      color: #d32f2f;
      background: #ffebee;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
    }

    .placeholder {
      color: #999;
      font-size: 12px;
      text-align: center;
      padding: 20px;
    }

    .instructions {
      padding: 16px;
      text-align: center;
      color: #666;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="pdf-panel">
      <div class="pdf-header">
        <h1 id="filename">Load a PDF to begin</h1>
        <input type="file" id="file-input" accept=".pdf">
        <button class="upload-btn" onclick="document.getElementById('file-input').click()">Upload PDF</button>
      </div>

      <div class="pdf-viewer" id="pdf-viewer">
        <div class="instructions">
          <p>Upload a PDF to start reading</p>
          <p style="font-size: 11px; margin-top: 8px; color: #999;">Select text and click "Ask AI" to ask questions</p>
        </div>
      </div>

      <div class="pdf-footer">
        Select text and ask AI anything
      </div>

      <!-- Floating Ask AI Button -->
      <button class="ask-ai-btn" id="ask-ai-btn" title="Ask AI">💬</button>
    </div>

    <!-- AI Panel Overlay -->
    <div class="ai-overlay" id="ai-overlay"></div>

    <!-- AI Panel -->
    <div class="ai-panel" id="ai-panel">
      <div class="ai-header">
        <h2>Ask Lumina</h2>
        <button class="close-btn" onclick="closeAiPanel()">✕</button>
      </div>

      <div style="padding: 0 16px;">
        <input type="password" class="api-key-input" id="api-key" placeholder="Paste your Gemini API key">
      </div>

      <div class="ai-content">
        <div class="question-input">
          <textarea id="question" placeholder="Ask about what you're reading..."></textarea>
          <button class="ask-btn" id="ask-btn" onclick="askAI()">Ask</button>
        </div>

        <div id="answer-container">
          <div class="placeholder">Your answer will appear here</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let pdfUrl = null;

    // File upload
    document.getElementById('file-input').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      document.getElementById('filename').textContent = file.name;
      const arrayBuffer = await file.arrayBuffer();
      loadPDF(arrayBuffer);
    });

    function loadPDF(arrayBuffer) {
      const blob = new Blob([arrayBuffer], { type: 'application/pdf' });
      pdfUrl = URL.createObjectURL(blob);
      
      document.getElementById('pdf-viewer').innerHTML = `
        <embed 
          src="${pdfUrl}" 
          type="application/pdf" 
          style="width: 100%; height: 100%; border: none;"
        >
      `;
    }

    // Text selection detection
    document.addEventListener('mouseup', () => {
      const selectedText = window.getSelection().toString().trim();
      if (selectedText.length > 0) {
        document.getElementById('question').value = selectedText;
        openAiPanel();
      }
    });

    // AI Panel controls
    function openAiPanel() {
      document.getElementById('ai-panel').classList.add('active');
      document.getElementById('ai-overlay').classList.add('active');
      document.getElementById('question').focus();
    }

    function closeAiPanel() {
      document.getElementById('ai-panel').classList.remove('active');
      document.getElementById('ai-overlay').classList.remove('active');
    }

    // Open panel on button click
    document.getElementById('ask-ai-btn').addEventListener('click', openAiPanel);

    // Close panel on overlay click
    document.getElementById('ai-overlay').addEventListener('click', closeAiPanel);

    // Ask AI
    async function askAI() {
      const question = document.getElementById('question').value.trim();
      const apiKey = document.getElementById('api-key').value.trim();

      if (!question) {
        alert('Please ask a question');
        return;
      }

      if (!apiKey) {
        alert('Please paste your Gemini API key');
        return;
      }

      const askBtn = document.getElementById('ask-btn');
      const container = document.getElementById('answer-container');

      askBtn.disabled = true;
      container.innerHTML = '<div class="loading">Thinking...</div>';

      try {
        const systemPrompt = 'You are a helpful AI assistant. Answer the user\'s question clearly and concisely.';

        const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + apiKey, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            system_instruction: { parts: [{ text: systemPrompt }] },
            contents: [{
              parts: [{
                text: question
              }]
            }]
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error?.message || 'API error');
        }

        const answer = data.candidates?.[0]?.content?.parts?.[0]?.text || 'No answer';
        container.innerHTML = `<div class="answer-box">${escapeHtml(answer)}</div>`;
      } catch (error) {
        container.innerHTML = `<div class="error">Error: ${error.message}</div>`;
      } finally {
        askBtn.disabled = false;
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Keyboard shortcut
    document.getElementById('question').addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeAiPanel();
      }
      if (e.key === 'Enter' && e.ctrlKey) {
        askAI();
      }
    });
  </script>
</body>
</html>
